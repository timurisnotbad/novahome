<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova Home · Ташкент</title>
<meta name="description" content="Nova Home — апартаменты бизнес-класса в Ташкенте, ЖК Nest One, Tashkent City">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0e0e14;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
  }

  .card {
    width: 100%;
    max-width: 400px;
    text-align: center;
  }

  .logo-wrap {
    margin-bottom: 28px;
  }

  .logo {
    width: 72px;
    height: 72px;
    background: linear-gradient(135deg, #1a1a2e, #16213e);
    border: 1.5px solid rgba(255,255,255,0.12);
    border-radius: 20px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    margin-bottom: 16px;
  }

  h1 {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: 2px;
    color: #fff;
    margin-bottom: 4px;
  }

  .tagline {
    font-size: 13px;
    color: rgba(255,255,255,0.45);
    letter-spacing: 0.5px;
  }

  .divider {
    width: 40px;
    height: 1.5px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
    margin: 24px auto;
  }

  .links {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  a.link-btn {
    display: flex;
    align-items: center;
    gap: 14px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    padding: 16px 20px;
    text-decoration: none;
    color: #fff;
    transition: background 0.2s, border-color 0.2s, transform 0.15s;
    text-align: left;
  }

  a.link-btn:active {
    transform: scale(0.98);
  }

  a.link-btn:hover {
    background: rgba(255,255,255,0.09);
    border-color: rgba(255,255,255,0.15);
  }

  .btn-icon {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  .btn-text {
    flex: 1;
  }

  .btn-label {
    font-size: 11px;
    color: rgba(255,255,255,0.4);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 2px;
  }

  .btn-value {
    font-size: 15px;
    font-weight: 500;
    color: #fff;
  }

  .btn-icon.map    { background: rgba(66, 133, 244, 0.15); }
  .btn-icon.phone  { background: rgba(52, 199, 89, 0.15); }
  .btn-icon.web    { background: rgba(255, 149, 0, 0.15); }
  .btn-icon.tg     { background: rgba(0, 136, 204, 0.15); }

  .footer {
    margin-top: 32px;
    font-size: 11px;
    color: rgba(255,255,255,0.2);
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>
<div class="card">

  <div class="logo-wrap">
    <div class="logo">🏢</div>
    <h1>NOVA HOME</h1>
    <p class="tagline">Апартаменты бизнес-класса · Ташкент</p>
  </div>

  <div class="divider"></div>

  <div class="links">

    <a class="link-btn" href="https://maps.app.goo.gl/8Exw2xfLpSVdcbAK6" target="_blank">
      <div class="btn-icon map">📍</div>
      <div class="btn-text">
        <div class="btn-label">Адрес</div>
        <div class="btn-value">ЖК Nest One, Tashkent City</div>
      </div>
    </a>

    <a class="link-btn" href="tel:+998900115074">
      <div class="btn-icon phone">📞</div>
      <div class="btn-text">
        <div class="btn-label">Телефон / WhatsApp</div>
        <div class="btn-value">+998 90 011 50 74</div>
      </div>
    </a>

    <a class="link-btn" href="https://novahome.uz" target="_blank">
      <div class="btn-icon web">🌐</div>
      <div class="btn-text">
        <div class="btn-label">Сайт</div>
        <div class="btn-value">novahome.uz</div>
      </div>
    </a>

    <a class="link-btn" href="https://t.me/novahome_uzbekistan" target="_blank">
      <div class="btn-icon tg">✈️</div>
      <div class="btn-text">
        <div class="btn-label">Telegram канал</div>
        <div class="btn-value">@novahome_uzbekistan</div>
      </div>
    </a>

  </div>

  <div class="footer">Nova Home · Ташкент · 2026</div>

</div>
</body>
</html>
